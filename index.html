  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

k;width:10px;height:10px;border-radius:3px;background:#0E9C82;margin-bottom:14px;\"><\u002Fspan>\n          <h3 style=\"font-size:16px;margin:0 0 8px;font-weight:600;color:{{ ink }};\">Dicionário de Dados<\u002Fh3>\n          <p style=\"color:{{ muted }};font-size:14px;margin:0;max-width:60ch;\">Cada tabela e coluna, com significado, tipo e dono — o contexto que não vem no information_schema.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- STACK -->\n    <div id=\"stack\" style=\"background:{{ surface }};border-radius:20px;padding:clamp(28px,5vw,48px);margin-bottom:clamp(16px,3vw,20px);box-shadow:{{ cardShadow }};\">\n      <div style=\"max-width:600px;margin-bottom:28px;\">\n        <span style=\"display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;color:{{ mintDeep }};background:{{ mintTint }};padding:4px 12px;border-radius:100px;margin-bottom:16px;\">COMO É CONSTRUÍDO<\u002Fspan>\n        <h2 style=\"font-size:clamp(20px,2.6vw,26px);letter-spacing:-.02em;margin:0 0 10px;font-weight:700;color:{{ ink }};\">PHP puro, sem mágica escondida<\u002Fh2>\n        <p style=\"color:{{ muted }};font-size:15px;margin:0;\">Sem framework, sem Composer, sem vendor/. Sobe com php -S, Apache, Nginx ou IIS.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:{{ ink2 }};background:{{ subtleBg }};padding:9px 15px;border-radius:100px;\">PHP 8.1+ puro<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:{{ ink2 }};background:{{ subtleBg }};padding:9px 15px;border-radius:100px;\">sem Composer / vendor<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:{{ ink2 }};background:{{ subtleBg }};padding:9px 15px;border-radius:100px;\">PDO multi-motor<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:{{ ink2 }};background:{{ subtleBg }};padding:9px 15px;border-radius:100px;\">MySQL · Postgres · SQL Server · SQLite<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:{{ ink2 }};background:{{ subtleBg }};padding:9px 15px;border-radius:100px;\">login JWT + bcrypt<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:{{ ink2 }};background:{{ subtleBg }};padding:9px 15px;border-radius:100px;\">export CSV / JSON<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FLOW -->\n    <div id=\"fluxo\" style=\"background:{{ surface }};border-radius:20px;padding:clamp(28px,5vw,48px);margin-bottom:clamp(16px,3vw,20px);box-shadow:{{ cardShadow }};\">\n      <div style=\"max-width:600px;margin-bottom:28px;\">\n        <span style=\"display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;color:{{ mintDeep }};background:{{ mintTint }};padding:4px 12px;border-radius:100px;margin-bottom:16px;\">O CICLO<\u002Fspan>\n        <h2 style=\"font-size:clamp(20px,2.6vw,26px);letter-spacing:-.02em;margin:0 0 10px;font-weight:700;color:{{ ink }};\">Definir, registrar, auditar<\u002Fh2>\n        <p style=\"color:{{ muted }};font-size:15px;margin:0;\">Três passos que fecham o loop de governança.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;\">\n        <div style=\"background:{{ subtleBg }};border-radius:14px;padding:22px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:#fff;background:#0E9C82;width:26px;height:26px;border-radius:100px;display:grid;place-items:center;margin-bottom:14px;\">1<\u002Fdiv>\n          <h3 style=\"font-size:15.5px;margin:0 0 6px;font-weight:600;color:{{ ink }};\">Definir<\u002Fh3>\n          <p style=\"color:{{ muted }};font-size:13.5px;margin:0;\">A verdade sobre o ambiente mora num só lugar.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:{{ subtleBg }};border-radius:14px;padding:22px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:#fff;background:#0E9C82;width:26px;height:26px;border-radius:100px;display:grid;place-items:center;margin-bottom:14px;\">2<\u002Fdiv>\n          <h3 style=\"font-size:15.5px;margin:0 0 6px;font-weight:600;color:{{ ink }};\">Registrar<\u002Fh3>\n          <p style=\"color:{{ muted }};font-size:13.5px;margin:0;\">Cada mudança entra no log com autor e motivo.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:{{ subtleBg }};border-radius:14px;padding:22px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:#fff;background:#0E9C82;width:26px;height:26px;border-radius:100px;display:grid;place-items:center;margin-bottom:14px;\">3<\u002Fdiv>\n          <h3 style=\"font-size:15.5px;margin:0 0 6px;font-weight:600;color:{{ ink }};\">Auditar<\u002Fh3>\n          <p style=\"color:{{ muted }};font-size:13.5px;margin:0;\">Exporte o retrato completo em CSV ou JSON.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- CTA -->\n    <div style=\"background:{{ ctaBg }};border-radius:20px;margin-bottom:clamp(16px,3vw,20px);display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));align-items:stretch;overflow:hidden;background-image:radial-gradient(circle at 88% 12%,rgba(14,156,130,.35),transparent 42%);\">\n      <div style=\"padding:clamp(28px,5vw,48px);align-self:center;\">\n        <h2 style=\"color:#fff;font-size:clamp(20px,2.8vw,24px);margin:0 0 10px;font-weight:700;letter-spacing:-.02em;\">Coloque a governança pra rodar hoje<\u002Fh2>\n        <p style=\"color:#9AAAC0;margin:0;font-size:15px;max-width:46ch;\">PHP puro, sem Composer e sem vendor. Rode o /setup e comece.<\u002Fp>\n      <\u002Fdiv>\n      <a href=\"https://github.com/supdata/gestao-dados/archive/refs/heads/main.zip\" target=\"_blank\" rel=\"noopen 11,17,32,.04)',\n      trackBg: '#E0E2E5',\n      knobColor: '#ffffff',\n      knobTransform: 'translateX(0px)'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
